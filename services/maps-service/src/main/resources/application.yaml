server:
  port: 8089

spring:
  application:
    name: maps-service
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      timeout: 2000ms

jwt:
  secret: ${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBiYWtlbGl2ZXJ5}
  access-ttl-millis: ${JWT_ACCESS_TTL:900000}

maps:
  osrm:
    url: ${OSRM_URL:http://localhost:5000}
    timeout-ms: ${OSRM_TIMEOUT_MS:5000}
  nominatim:
    url: ${NOMINATIM_URL:https://nominatim.openstreetmap.org}
    timeout-ms: ${NOMINATIM_TIMEOUT_MS:3000}
    user-agent: ${NOMINATIM_USER_AGENT:bakelivery-dev/1.0}

cache:
  geocoding-ttl-days: ${CACHE_GEOCODING_TTL_DAYS:30}
  matrix-ttl-hours: ${CACHE_MATRIX_TTL_HOURS:24}

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411}/api/v2/spans
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}

---
spring:
  config:
    activate:
      on-profile: prod
  data:
    redis:
      sentinel:
        master: ${REDIS_SENTINEL_MASTER:mymaster}
        nodes: ${REDIS_SENTINEL_NODES:sentinel-1:26379,sentinel-2:26379,sentinel-3:26379}
