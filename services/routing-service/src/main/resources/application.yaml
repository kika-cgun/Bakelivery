server:
  port: 8086

spring:
  application:
    name: routing-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5439/bakelivery_routing}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

dispatch:
  service:
    url: ${DISPATCH_SERVICE_URL:http://localhost:8085}
maps:
  service:
    url: ${MAPS_SERVICE_URL:http://localhost:8089}

jwt:
  secret: ${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBiYWtlbGl2ZXJ5}
  access-ttl-millis: ${JWT_ACCESS_TTL:900000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
