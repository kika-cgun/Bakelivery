services:
  postgres-auth:
    image: postgres:16
    environment:
      POSTGRES_DB: bakelivery_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5433:5432"]
    volumes: ["pg-auth-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bakelivery_auth"]
      interval: 5s
      timeout: 3s
      retries: 10

  auth-service:
    build:
      context: ../services/auth-service
    depends_on:
      postgres-auth:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres-auth:5432/bakelivery_auth
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBiYWtlbGl2ZXJ5
    ports: ["8081:8081"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api-gateway:
    build:
      context: ../services/api-gateway
    depends_on:
      auth-service:
        condition: service_healthy
      customer-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      JWT_SECRET: dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBiYWtlbGl2ZXJ5
      AUTH_SERVICE_URL: http://auth-service:8081
      CUSTOMER_SERVICE_URL: http://customer-service:8082
      CATALOG_SERVICE_URL: http://catalog-service:8083
      ORDER_SERVICE_URL: http://order-service:8084
      REDIS_URL: redis://redis:6379
    ports: ["8080:8080"]

  postgres-customer:
    image: postgres:16
    environment:
      POSTGRES_DB: bakelivery_customer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5434:5432"]
    volumes: ["pg-customer-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bakelivery_customer"]
      interval: 5s
      timeout: 3s
      retries: 10

  customer-service:
    build:
      context: ../services/customer-service
    depends_on:
      postgres-customer:
        condition: service_healthy
      maps-service:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres-customer:5432/bakelivery_customer
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBiYWtlbGl2ZXJ5
      MAPS_SERVICE_URL: http://maps-service:8089
    ports: ["8082:8082"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgres-catalog:
    image: postgres:16
    environment:
      POSTGRES_DB: bakelivery_catalog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5435:5432"]
    volumes: ["pg-catalog-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bakelivery_catalog"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio-data:/data"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  catalog-service:
    build:
      context: ..
      dockerfile: services/catalog-service/Dockerfile
    depends_on:
      postgres-catalog:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres-catalog:5432/bakelivery_catalog
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBiYWtlbGl2ZXJ5
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio12345
      MINIO_BUCKET: bakelivery-catalog
    ports: ["8083:8083"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  rabbitmq:
    image: rabbitmq:3-management
    ports: ["5672:5672", "15672:15672"]
    volumes: ["rabbitmq-data:/var/lib/rabbitmq"]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mailpit:
    image: axllent/mailpit:latest
    ports: ["1025:1025", "8025:8025"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8025/api/v1/info"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-order:
    image: postgres:16
    environment:
      POSTGRES_DB: bakelivery_order
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5436:5432"]
    volumes: ["pg-order-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bakelivery_order"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres-invoice:
    image: postgres:16
    environment:
      POSTGRES_DB: bakelivery_invoice
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5437:5432"]
    volumes: ["pg-invoice-data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bakelivery_invoice"]
      interval: 5s
      timeout: 3s
      retries: 10

  order-service:
    build:
      context: ..
      dockerfile: services/order-service/Dockerfile
    depends_on:
      postgres-order:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres-order:5432/bakelivery_order
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBiYWtlbGl2ZXJ5
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      CATALOG_SERVICE_URL: http://catalog-service:8083
    ports: ["8084:8084"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  notification-service:
    build:
      context: ../services/notification-service
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
    ports: ["8090:8090"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  invoice-service:
    build:
      context: ..
      dockerfile: services/invoice-service/Dockerfile
    depends_on:
      postgres-invoice:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres-invoice:5432/bakelivery_invoice
      DB_USER: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio12345
      MINIO_BUCKET: bakelivery-invoices
    ports: ["8091:8091"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8091/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ─── Faza 5: Redis + OSRM + maps-service ───────────────────────
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: ["redis-data:/data"]
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  osrm:
    image: osrm/osrm-backend:v5.27.1
    command: osrm-routed --algorithm mld /data/poland-latest.osrm
    volumes: ["osrm-data:/data"]
    ports: ["5000:5000"]
    profiles: ["osrm"]

  maps-service:
    build:
      context: ../services/maps-service
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dGhpcyBpcyBhIHZlcnkgbG9uZyBzZWNyZXQga2V5IGZvciBiYWtlbGl2ZXJ5
      OSRM_URL: http://osrm:5000
      NOMINATIM_URL: https://nominatim.openstreetmap.org
      NOMINATIM_USER_AGENT: bakelivery/1.0
    ports: ["8089:8089"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8089/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  pg-auth-data:
  pg-customer-data:
  pg-catalog-data:
  pg-order-data:
  pg-invoice-data:
  minio-data:
  rabbitmq-data:
  redis-data:
  osrm-data:
